services:
  cyber-cord.api:
    container_name: api
    image: cyber-cord.api
    build:
      context: .
      dockerfile: Cyber-Cord.Api/Dockerfile
    volumes: 
      - $APPDATA/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - $USERPROFILE/.aspnet/https:/https:ro
    depends_on:
      - database
    ports:
      - "8080:8080"
      - "8081:8081"
    hostname: api
    environment:
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=yourpassword
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx

  
  database:
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    user: root
    container_name: sql_server
    hostname: database
    environment:
      - ACCEPT_EULA=y
      - SA_PASSWORD=e65e2709-9b47-44dc-a0f8-780830ff000f
      - MSQL_PID=Express
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - sql_server_data:/var/opt/mssql/data
      - sql_server_log:/var/opt/mssql/log
      - sql_server_secrets:/var/opt/mssql/secrets
  
  livekit:
    container_name: livekit
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --bind 0.0.0.0
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882"
      - "50000-50020:50000-50020/udp"
    hostname: livekit
      
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    network_mode: host   # needs host network for TURN to work properly
    volumes:
      - ./coturn.conf:/etc/coturn/turnserver.conf
    restart: always
    

      
volumes:
  sql_server_data:
  sql_server_log:
  sql_server_secrets: