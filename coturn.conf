listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Use your LAN IP here
external-ip=192.168.0.169

realm=cybercord.local
server-name=cybercord.local

# TURN credentials — pick any username/password
user=cybercord:turnsecret

# No TLS for local dev
no-tls
no-dtls

no-stdout-log
log-file=/dev/stdout